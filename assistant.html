<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>销售助理 · 三千彩环保订单</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-role="assistant" data-can-delete="false">
    <main class="admin-shell role-shell">
      <header class="admin-topbar">
        <div class="brand-heading">
          <img class="brand-logo" src="./logo.svg" alt="三千彩纳米新材料有限公司" />
          <div>
            <p class="eyebrow">内部流程</p>
            <h1>销售助理</h1>
          </div>
        </div>
      </header>

      <section class="customer-manager">
        <div class="section-title">
          <div>
            <p class="eyebrow">客户二维码 / 专属单价</p>
            <h2>客户管理</h2>
          </div>
        </div>
        <form id="customerForm" class="customer-form">
          <input id="customerCode" placeholder="客户编号，例如 a001" required />
          <input id="customerName" placeholder="客户名称" required />
          <input id="customerContactName" placeholder="联系人" />
          <input id="customerPhone" placeholder="联系电话" />
          <input id="customerAddress" placeholder="收货地址" />
          <label class="customer-price-toggle">
            <input id="customerShowPrices" type="checkbox" />
            <span>该客户显示价格</span>
          </label>
          <button type="submit">保存客户</button>
          <button class="secondary-form-button" type="submit" name="saveAction" value="copyOrderLink">保存本次并复制下单链接</button>
          <div class="price-editor" id="priceEditor"></div>
        </form>
        <div id="customerList" class="customer-list"></div>
      </section>

      <section class="customer-manager">
        <div class="section-title">
          <div>
            <p class="eyebrow">色号维护</p>
            <h2>产品管理</h2>
          </div>
        </div>
        <form id="productForm" class="customer-form product-form">
          <input id="productColor" placeholder="颜色名称，例如 亮绿" required />
          <input id="productNumber" placeholder="编号，例如 G-101" required />
          <select id="productCategory" aria-label="色系">
            <option>黄色系</option>
            <option>红色系</option>
            <option>紫色系</option>
            <option>橙色系</option>
            <option>蓝色系</option>
            <option>黑色系</option>
            <option>其他</option>
          </select>
          <button type="submit">添加产品</button>
        </form>
        <div id="productList" class="product-list"></div>
      </section>

      <section class="admin-stats role-stats" aria-label="销售助理待办">
        <div>
          <span>待处理订单</span>
          <strong id="cookingCount">0</strong>
        </div>
      </section>

      <section class="admin-orders" id="adminOrders" aria-live="polite"></section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./admin.js"></script>
  </body>
</html>
