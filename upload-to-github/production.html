<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生产入库 · 三千彩环保订单</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-role="stock" data-can-delete="false">
    <main class="admin-shell role-shell">
      <header class="admin-topbar">
        <div class="brand-heading">
          <img class="brand-logo" src="./logo.svg" alt="三千彩纳米新材料有限公司" />
          <div>
            <p class="eyebrow">生产入库</p>
            <h1>入库网站</h1>
          </div>
        </div>
        <div class="admin-top-actions">
          <a class="admin-link secondary-link" href="./outbound.html">出库网站</a>
          <a class="admin-link secondary-link" href="./stock.html">仓库</a>
        </div>
      </header>

      <section class="customer-manager">
        <div class="section-title">
          <div>
            <p class="eyebrow">生产完成后登记</p>
            <h2>新增入库批号</h2>
          </div>
        </div>
        <form id="batchForm" class="customer-form">
          <select id="batchProduct" aria-label="入库产品"></select>
          <input id="batchCode" placeholder="批号，例如 20260526-001" required />
          <input id="batchQuantity" type="number" min="0" step="0.01" placeholder="入库数量（公斤）" required />
          <input id="batchDate" type="date" />
          <input id="batchNote" placeholder="备注，例如 1号机生产" />
          <button type="submit">保存入库</button>
        </form>
      </section>

      <section class="customer-manager">
        <div class="section-title">
          <div>
            <p class="eyebrow">批号库存</p>
            <h2>入库记录</h2>
          </div>
        </div>
        <div id="batchList" class="batch-list"></div>
      </section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./admin.js"></script>
  </body>
</html>
