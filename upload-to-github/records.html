<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>订单记录 · 三千彩环保订单</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-role="all" data-can-delete="false">
    <main class="admin-shell role-shell">
      <header class="admin-topbar">
        <div class="brand-heading">
          <img class="brand-logo" src="./logo.svg" alt="三千彩纳米新材料有限公司" />
          <div>
            <p class="eyebrow">全部记录</p>
            <h1>订单记录查询</h1>
          </div>
        </div>
        <div class="admin-top-actions">
          <button class="admin-link secondary-link" id="copyCsv" type="button">复制Excel数据</button>
          <a class="admin-link" href="./stock.html">仓库页面</a>
        </div>
      </header>

      <section class="admin-stats" aria-label="订单统计">
        <div>
          <span>买方待确认</span>
          <strong id="newCount">0</strong>
        </div>
        <div>
          <span>业务员</span>
          <strong id="salesCount">0</strong>
        </div>
        <div>
          <span>销售助理</span>
          <strong id="cookingCount">0</strong>
        </div>
        <div>
          <span>仓库/已发货</span>
          <strong id="totalCount">0</strong>
        </div>
      </section>

      <section class="admin-orders" id="adminOrders" aria-live="polite"></section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./admin.js"></script>
  </body>
</html>
