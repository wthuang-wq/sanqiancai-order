<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生产入库 · 三千彩环保订单</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-role="stock" data-can-delete="false">
    <main class="admin-shell role-shell">
      <header class="admin-topbar">
        <div class="brand-heading">
          <img class="brand-logo" src="./logo.svg" alt="三千彩纳米新材料有限公司" />
          <div>
            <p class="eyebrow">生产入库</p>
            <h1>入库网站</h1>
          </div>
        </div>
        <div class="admin-top-actions">
          <a class="admin-link secondary-link" href="./batch-trace.html">批号追溯</a>
        </div>
      </header>

      <section class="customer-manager inventory-manager">
        <div class="section-title">
          <div>
            <p class="eyebrow">实时库存</p>
            <h2>库存管理</h2>
          </div>
        </div>
        <div id="inventoryList" class="inventory-list"></div>
      </section>

      <section class="customer-manager">
        <div class="section-title">
          <div>
            <p class="eyebrow">入库后登记</p>
            <h2>新增入库批号</h2>
          </div>
        </div>
        <form id="batchForm" class="customer-form batch-form">
          <input id="batchCode" placeholder="批号，例如 20260526-001" required />
          <input id="batchDate" type="date" />
          <input id="batchNote" placeholder="备注，例如 1号机生产" />
          <div class="product-search-field">
            <input id="batchProductSearch" type="search" placeholder="搜索产品名称或编号" autocomplete="off" />
            <input id="batchProduct" type="hidden" />
            <div id="batchProductResults" class="product-search-results" hidden></div>
          </div>
          <input id="batchQuantity" type="number" min="0" step="0.01" placeholder="入库数量（公斤）" />
          <button id="addBatchItem" class="secondary-form-button" type="button">添加产品</button>
          <div id="batchItems" class="batch-item-list"></div>
          <button type="submit">保存整批入库</button>
        </form>
      </section>

      <section class="customer-manager">
        <div class="section-title">
          <div>
            <p class="eyebrow">批号库存</p>
            <h2>入库记录</h2>
          </div>
        </div>
        <div id="batchList" class="batch-list"></div>
      </section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./admin.js"></script>
  </body>
</html>
