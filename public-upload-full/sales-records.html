<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>业务员订单记录 · 三千彩环保订单</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-role="sales" data-can-delete="false" data-records="true">
    <main class="admin-shell role-shell">
      <header class="admin-topbar">
        <div class="brand-heading">
          <img class="brand-logo" src="./logo.svg" alt="三千彩纳米新材料有限公司" />
          <div>
            <p class="eyebrow">业务员记录</p>
            <h1>订单记录</h1>
            <p class="cart-item-meta" id="salesIdentity"></p>
          </div>
        </div>
        <div class="admin-top-actions">
          <a class="admin-link secondary-link" id="salesOrderLink" href="./index.html?source=sales">业务员下单</a>
          <a class="admin-link" id="salesBackLink" href="./sales.html">返回业务员</a>
        </div>
      </header>

      <section class="admin-stats" aria-label="业务员订单统计">
        <div>
          <span>业务员订单</span>
          <strong id="salesCount">0</strong>
        </div>
        <div>
          <span>销售助理</span>
          <strong id="cookingCount">0</strong>
        </div>
        <div>
          <span>老板审批</span>
          <strong id="ownerCount">0</strong>
        </div>
        <div>
          <span>仓库/已发货</span>
          <strong id="totalCount">0</strong>
        </div>
      </section>

      <section class="admin-orders" id="adminOrders" aria-live="polite"></section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./admin.js"></script>
  </body>
</html>
