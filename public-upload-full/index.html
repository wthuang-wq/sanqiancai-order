<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三千彩环保 · 特凯隆色浆订购</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="menu-panel">
        <header class="topbar">
          <div class="brand-heading">
            <img class="brand-logo" src="./logo.svg" alt="三千彩纳米新材料有限公司" />
            <div>
              <p class="eyebrow">特凯隆 · 免水洗染色色浆系列</p>
              <h1>三千彩环保色浆订购</h1>
            </div>
          </div>
        </header>

        <div class="customer-banner" id="customerBanner">
          <strong>通用客户</strong>
          <span>请填写公司 / 联系方式后下单</span>
        </div>

        <label class="sales-customer-box" id="salesCustomerBox" hidden>
          <span>下单公司</span>
          <select id="salesCustomerSelect">
            <option value="">请选择客户公司</option>
          </select>
        </label>

        <section class="frequent-section" id="frequentSection" hidden>
          <div class="section-title compact-title">
            <div>
              <p class="eyebrow">客户常购</p>
              <h2>常购色号</h2>
            </div>
          </div>
          <div class="frequent-list" id="frequentList"></div>
        </section>

        <div class="search-row">
          <input id="searchInput" type="search" placeholder="搜索颜色、编号、类型" autocomplete="off" />
          <button id="onlyHot" class="filter-button" type="button">推荐</button>
        </div>

        <nav class="category-tabs" aria-label="色号分类" id="categoryTabs"></nav>

        <section class="dish-list" id="dishList" aria-live="polite"></section>
      </section>

      <aside class="cart-panel" aria-label="订单">
        <div class="cart-heading">
          <div>
            <p class="eyebrow">已选色号</p>
            <h2>订单</h2>
          </div>
          <span class="cart-count" id="cartCount">0</span>
        </div>
        <button class="clear-order-button" id="clearCart" type="button">清空订单</button>

        <label class="table-box">
          <span>下单客户 / 联系方式</span>
          <input id="tableNo" type="text" value="" placeholder="公司名、手机号" autocomplete="off" />
        </label>
        <div class="locked-customer" id="lockedCustomer"></div>

        <div class="cart-list" id="cartList"></div>

        <label class="note-box">
          <span>需求备注</span>
          <textarea id="orderNote" rows="3" placeholder="例如：用于棉布、每个色号 60公斤"></textarea>
        </label>

        <label class="approval-box" id="approvalBox">
          <input id="skipBossApproval" type="checkbox" />
          <span>跳过老板审核，直接发给业务员</span>
        </label>

        <div class="summary">
          <div>
            <span>色号数</span>
            <strong id="subtotal">0</strong>
          </div>
          <div>
            <span>总重量</span>
            <strong id="serviceFee">0</strong>
          </div>
          <div class="total">
            <span>合计</span>
            <strong id="totalPrice">待确认</strong>
          </div>
        </div>

        <button class="submit-button" id="submitOrder" type="button">提交订单</button>

        <a class="customer-orders-button" id="customerOrdersLink" href="./customer-orders.html" hidden>查看订单状态</a>
      </aside>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
  </body>
</html>
